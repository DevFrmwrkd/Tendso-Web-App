name: Deploy to Vercel Production

# Runs on every push to main and can be triggered manually from the Actions tab.
# Bypasses Vercel Hobby's "private repo, author must match owner" block by
# rewriting the HEAD commit's author inside the ephemeral runner only — the
# real branch history on GitHub stays untouched.
on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

jobs:
  deploy:
    runs-on: ubuntu-latest

    # If a new push lands while a deploy is in flight, cancel the older run
    # so we don't queue stale deploys behind it.
    concurrency:
      group: vercel-prod
      cancel-in-progress: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # CI-only author rewrite. Vercel Hobby checks HEAD's author email against
      # the owner's verified emails. We rewrite HEAD here in the runner; this
      # amended commit is never pushed back to GitHub, so the real history
      # (and contributor attribution) stays correct.
      - name: Rewrite commit author for Vercel Hobby
        run: |
          git config user.email "frmwrkd.media@gmail.com"
          git config user.name "Valiantic"
          git commit --amend --no-edit --reset-author

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      # Pulls all production env vars from the linked Vercel project into the
      # runner. Re-runs every deploy so any dashboard env-var changes show up
      # without a code change.
      - name: Pull Vercel environment
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
